spring.application.name=dexscreener

# Telegram Bot config
telegram.bot.token=YOUR_BOT_TOKEN
telegram.chat.id=YOUR_CHAT_ID

# DexScreener watchlist
dexscreener.chainId=solana
# Comma-separated pair addresses to monitor
dexscreener.pairAddresses=0xPAIR1,0xPAIR2,0xPAIR3
# How many top spikers to alert on
dexscreener.topN=3
