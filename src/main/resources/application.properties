spring.application.name=dexscreener
spring.config.import=optional:file:./application-local.properties

# Telegram Bot config (set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID as env vars or in application-local.properties)
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}

# DexScreener watchlist
dexscreener.chainId=solana
# Comma-separated pair addresses to monitor
dexscreener.pairAddresses=A6KHMiFzn9AM7VKBtVP4fZNY9bCo2jP63R9dphaW1vrq,HGGLfzFMqG21vjK17N5XiWbP6K41Ni2G6PXXKSKNTJR,3h7FdaFtMdAQE2FoJAyPkWyP4GUBSPusPtXbbTyJUgph

# Helius wallet tracking (set HELIUS_API_KEY as env var or in application-local.properties)
helius.api.key=${HELIUS_API_KEY}
# Public URL this server is reachable at — Helius will POST transaction events here
helius.webhook.url=${HELIUS_WEBHOOK_URL}
# Comma-separated Solana wallet addresses to watch for buy transactions
helius.tracked.wallets=${HELIUS_TRACKED_WALLETS}
# Optional secret — if set, Helius will include it as the Authorization header on each POST
# so you can reject requests not originating from Helius. Set the same value in the Helius dashboard.
helius.auth.header=${HELIUS_AUTH_HEADER:}

